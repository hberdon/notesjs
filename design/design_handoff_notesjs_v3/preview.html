<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<title>notes.js V3 (FREE) — design reference</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  html, body, #root { height: 100%; margin: 0; }
  body { background: #f7f7f9; font-family: 'Nunito', system-ui, sans-serif; }
  @keyframes njBlink { 0%, 100% { opacity: 1 } 50% { opacity: 0 } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Order: design-canvas → shared primitives (tokens, icons, avatar) → v3 formats → v3 frame -->
<script type="text/babel" src="src/design-canvas.jsx"></script>
<script type="text/babel" src="src/notesjs-shared-primitives.jsx"></script>
<script type="text/babel" src="src/notesjs-v3-formats.jsx"></script>
<script type="text/babel" src="src/notesjs-v3.jsx"></script>

<script type="text/babel">
const { V3Login, V3Frame } = window;

function App() {
  return (
    <DesignCanvas>
      <DCSection
        id="nj3"
        title="notes.js · V3 — tier FREE"
        subtitle="Sustituto del Bloc de notas / Notas. Menús estrechos, lo básico, compartir tipo pastebin."
      >
        <DCArtboard id="nj3-login"    label="A · Login — Google · GitHub · email · invitado" width={1280} height={760}>
          <V3Login />
        </DCArtboard>
        <DCArtboard id="nj3-closed"   label="B · Editor — main.js con resaltado de sintaxis + pill JS coloreada" width={1280} height={680}>
          <V3Frame openMenu={null} activeIdx={0} />
        </DCArtboard>
        <DCArtboard id="nj3-json"     label="C · config.json + panel derecho con árbol navegable" width={1280} height={680}>
          <V3Frame openMenu={null} activeIdx={1} rightPanel="tree" />
        </DCArtboard>
        <DCArtboard id="nj3-md"       label="D · reunión.md + panel derecho con vista previa renderizada" width={1280} height={680}>
          <V3Frame openMenu={null} activeIdx={2} rightPanel="preview" />
        </DCArtboard>
        <DCArtboard id="nj3-txt"      label="E · lista.txt — texto plano, sin resaltado, sin panel" width={1280} height={680}>
          <V3Frame openMenu={null} activeIdx={3} />
        </DCArtboard>
        <DCArtboard id="nj3-archivo"  label="F · Archivo — dropdown estrecho" width={1280} height={680}>
          <V3Frame openMenu="archivo" activeIdx={0} />
        </DCArtboard>
        <DCArtboard id="nj3-editar"   label="G · Editar — incluye Formatear ⌘⇧F y Minimizar ⌘⇧M" width={1280} height={680}>
          <V3Frame openMenu="editar" activeIdx={1} />
        </DCArtboard>
        <DCArtboard id="nj3-buscar"   label="H · Buscar — buscar/reemplazar local" width={1280} height={680}>
          <V3Frame openMenu="buscar" activeIdx={0} />
        </DCArtboard>
        <DCArtboard id="nj3-compartir" label="I · Compartir — pastebin: caducidad + contraseña + solo ver/descargar" width={1280} height={680}>
          <V3Frame openMenu="compartir" activeIdx={0} />
        </DCArtboard>
        <DCArtboard id="nj3-ver"      label="J · Ver — tema, editor toggles, slider de tamaño" width={1280} height={680}>
          <V3Frame openMenu="ver" activeIdx={0} />
        </DCArtboard>
        <DCArtboard id="nj3-ayuda"    label="K · Ayuda — incluye CTA suave a notes.js Pro" width={1280} height={680}>
          <V3Frame openMenu="ayuda" activeIdx={0} />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
